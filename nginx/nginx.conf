# 1. Редирект с HTTP на HTTPS
server {
    listen 80;
    server_name siteforlabs.ru www.siteforlabs.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Основной HTTPS сервер
server {
    listen 443 ssl;
    server_name siteforlabs.ru www.siteforlabs.ru;

    # Твои пути к сертификатам (оставь как есть, они у тебя уже работают)
    ssl_certificate /etc/nginx/live/live/siteforlabs.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/live/live/siteforlabs.ru/privkey.pem;

    # --- 1. ВКЛЮЧАЕМ СЖАТИЕ (GZIP) ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --- 2. НАСТРАИВАЕМ КЭШ ДЛЯ СТАТИКИ ---
    # Браузер будет хранить картинки, шрифты и старые версии JS/CSS год
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        # Запрет кэширования для HTML
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # Твой блок для API
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}