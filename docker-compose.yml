version: '3.8'

services:
  backend:
    build: ./server
    container_name: payment-backend
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=https://YOUR_IP.sslip.io # Подставим на сервере
    expose:
      - "5000"
    restart: always
    networks:
      - app-network

  nginx:
    build: ./nginx
    container_name: payment-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./.data/certbot/conf:/etc/nginx/live
      - ./.data/certbot/www:/var/www/certbot
    depends_on:
      - backend
    restart: always
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: payment-certbot
    volumes:
      - ./.data/certbot/conf:/etc/letsencrypt
      - ./.data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge